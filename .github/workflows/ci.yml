name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout rebuild-plugin-ui-css-purge
        uses: actions/checkout@v4
        with:
          repository: pathscale/rebuild-plugin-ui-css-purge
          path: rebuild-plugin-ui-css-purge

      - name: Symlink plugin to expected path
        run: ln -s $GITHUB_WORKSPACE/rebuild-plugin-ui-css-purge ../rebuild-plugin-ui-css-purge

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Contract Check
        run: bun run check

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build
        run: bun run build
